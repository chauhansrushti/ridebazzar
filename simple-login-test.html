<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Login Test - RideBazzar</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
        button:hover { background: #0056b3; }
        .message { margin: 15px 0; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Simple Login Test</h1>
        <p>Testing login and redirect without modal complexity</p>
        
        <form onsubmit="event.preventDefault(); testLogin();">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" value="srushti" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" value="srushti123" required>
            </div>
            
            <button type="submit">Login & Redirect</button>
        </form>
        
        <div id="message"></div>
    </div>

    <script src="js/auth-api.js"></script>
    <script>
        function showMessage(text, type = 'info') {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = text;
        }

        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            console.log('🔄 Starting simple login test...');
            showMessage('🔄 Logging in...', 'info');
            
            try {
                console.log('🔄 Calling authManager.loginUser...');
                const result = await window.authManager.loginUser(username, password);
                console.log('📋 Full login result:', result);
                
                if (result.success) {
                    console.log('✅ Login successful!');
                    console.log('👤 User data:', result.user);
                    console.log('🎭 User role:', result.user.role);
                    
                    showMessage(`✅ Login successful! User: ${result.user.username}, Role: ${result.user.role}`, 'success');
                    
                    // Determine redirect URL
                    const redirectUrl = result.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
                    console.log('🚀 Should redirect to:', redirectUrl);
                    
                    showMessage(`🔄 Redirecting to ${redirectUrl} in 3 seconds...`, 'info');
                    
                    // Store user data
                    localStorage.setItem('authToken', result.user.token || 'test-token');
                    localStorage.setItem('currentUser', JSON.stringify(result.user));
                    
                    // Redirect after delay
                    setTimeout(() => {
                        console.log('🚀 Executing redirect to:', redirectUrl);
                        window.location.href = redirectUrl;
                    }, 3000);
                    
                } else {
                    console.log('❌ Login failed:', result.message);
                    showMessage(`❌ Login failed: ${result.message}`, 'error');
                }
            } catch (error) {
                console.error('❌ Login error:', error);
                showMessage(`❌ Login error: ${error.message}`, 'error');
                showMessage('💡 Check browser console for details', 'info');
            }
        }

        // Check if authManager is loaded
        window.addEventListener('load', () => {
            if (window.authManager) {
                showMessage('✅ AuthManager loaded successfully', 'success');
            } else {
                showMessage('❌ AuthManager not loaded', 'error');
            }
        });
    </script>
</body>
</html>
