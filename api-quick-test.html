<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick API Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            white-space: pre-wrap;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Quick API Test</h1>
        
        <button onclick="testHealth()">Test Health API</button>
        <button onclick="testLogin()">Test Login API</button>
        <button onclick="testCORS()">Test CORS</button>
        
        <div id="result"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        const resultDiv = document.getElementById('result');

        function showResult(message, isSuccess = false) {
            resultDiv.textContent = message;
            resultDiv.className = `result ${isSuccess ? 'success' : 'error'}`;
        }

        async function testHealth() {
            try {
                showResult('Testing health endpoint...');
                const response = await fetch(`${API_BASE_URL}/health`);
                const data = await response.json();
                
                showResult(`✅ Health API Success!\n\nStatus: ${response.status}\nResponse: ${JSON.stringify(data, null, 2)}`, true);
            } catch (error) {
                showResult(`❌ Health API Failed!\n\nError: ${error.message}\n\nPossible causes:\n- Backend server not running\n- CORS issues\n- Network connectivity`);
            }
        }

        async function testLogin() {
            try {
                showResult('Testing login endpoint...');
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    }),
                });

                const data = await response.json();
                
                if (response.ok) {
                    showResult(`✅ Login API Success!\n\nStatus: ${response.status}\nUser: ${data.user?.username}\nMessage: ${data.message}`, true);
                } else {
                    showResult(`❌ Login API Failed!\n\nStatus: ${response.status}\nError: ${data.message || 'Unknown error'}\nResponse: ${JSON.stringify(data, null, 2)}`);
                }
            } catch (error) {
                showResult(`❌ Login API Failed!\n\nError: ${error.message}\n\nPossible causes:\n- Backend server not running\n- CORS issues\n- Database connection problems`);
            }
        }

        async function testCORS() {
            try {
                showResult('Testing CORS configuration...');
                
                // Test preflight request
                const response = await fetch(`${API_BASE_URL}/health`, {
                    method: 'OPTIONS'
                });
                
                showResult(`✅ CORS Test Success!\n\nStatus: ${response.status}\nAccess-Control-Allow-Origin: ${response.headers.get('Access-Control-Allow-Origin') || 'Not set'}\nAccess-Control-Allow-Methods: ${response.headers.get('Access-Control-Allow-Methods') || 'Not set'}`, true);
            } catch (error) {
                showResult(`❌ CORS Test Failed!\n\nError: ${error.message}\n\nThis indicates CORS is blocking requests from file:// URLs`);
            }
        }

        // Auto-test on page load
        window.addEventListener('load', () => {
            setTimeout(testHealth, 500);
        });
    </script>
</body>
</html>
