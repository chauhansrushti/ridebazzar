<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Complete Flow Test - RideBazzar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .test-section {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
    }
    .test-button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-primary {
      background: #007bff;
      color: white;
    }
    .btn-success {
      background: #28a745;
      color: white;
    }
    .btn-info {
      background: #17a2b8;
      color: white;
    }
    .btn-danger {
      background: #dc3545;
      color: white;
    }
    .status {
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
      font-weight: bold;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .warning {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeaa7;
    }
    .info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    .output {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      padding: 15px;
      margin: 10px 0;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }
    h1, h2 {
      color: #333;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
    }
    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th {
      background: #f8f9fa;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🧪 RideBazzar Complete Flow Test</h1>
  
  <div class="test-section">
    <h2>1️⃣ Authentication Test</h2>
    <button class="test-button btn-primary" onclick="testAuth()">Test Auth Token</button>
    <button class="test-button btn-primary" onclick="testUserData()">Test User Data</button>
    <div id="authOutput" class="output" style="display:none;"></div>
  </div>

  <div class="test-section">
    <h2>2️⃣ Bookings API Test</h2>
    <button class="test-button btn-info" onclick="testMyBookings()">Get My Bookings</button>
    <button class="test-button btn-info" onclick="testMySales()">Get My Sales</button>
    <div id="bookingsOutput" class="output" style="display:none;"></div>
  </div>

  <div class="test-section">
    <h2>3️⃣ Inquiries API Test</h2>
    <button class="test-button btn-info" onclick="testReceivedInquiries()">Get Received Inquiries</button>
    <button class="test-button btn-info" onclick="testSentInquiries()">Get Sent Inquiries</button>
    <div id="inquiriesOutput" class="output" style="display:none;"></div>
  </div>

  <div class="test-section">
    <h2>4️⃣ Transactions API Test</h2>
    <button class="test-button btn-info" onclick="testTransactionHistory()">Get Transaction History</button>
    <div id="transactionsOutput" class="output" style="display:none;"></div>
  </div>

  <div class="test-section">
    <h2>5️⃣ Data Refresh Test (Real-time)</h2>
    <p>This will refresh all data every 5 seconds for 30 seconds</p>
    <button class="test-button btn-success" onclick="testAutoRefresh()">Start Auto-Refresh Test</button>
    <div id="refreshOutput" class="output" style="display:none;"></div>
  </div>

  <script>
    const API_BASE = 'http://localhost:5000/api';
    
    function getAuthHeaders() {
      const token = localStorage.getItem('authToken');
      return {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      };
    }

    function showOutput(id, content, type = 'info') {
      const output = document.getElementById(id);
      output.style.display = 'block';
      output.className = 'output';
      output.innerHTML = `<div class="status ${type}">${type.toUpperCase()}</div>\n${content}`;
    }

    async function testAuth() {
      try {
        const token = localStorage.getItem('authToken');
        const userData = localStorage.getItem('userData');
        
        let output = `Token: ${token ? '✅ Present' : '❌ Missing'}\n`;
        output += `Token Length: ${token ? token.length : 0}\n\n`;
        output += `User Data: ${userData ? '✅ Present' : '❌ Missing'}\n`;
        
        if (userData) {
          try {
            const user = JSON.parse(userData);
            output += `\nLogged In User:\n`;
            output += `├─ Username: ${user.username}\n`;
            output += `├─ Email: ${user.email}\n`;
            output += `├─ User ID: ${user.userId}\n`;
            output += `└─ Role: ${user.role}`;
          } catch (e) {
            output += `Error parsing user data: ${e.message}`;
          }
        }
        
        showOutput('authOutput', output, 'success');
      } catch (error) {
        showOutput('authOutput', `Error: ${error.message}`, 'error');
      }
    }

    async function testUserData() {
      try {
        const response = await fetch(`${API_BASE}/auth/user`, {
          headers: getAuthHeaders()
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        showOutput('authOutput', JSON.stringify(data, null, 2), data.success ? 'success' : 'error');
      } catch (error) {
        showOutput('authOutput', `API Error: ${error.message}`, 'error');
      }
    }

    async function testMyBookings() {
      try {
        const response = await fetch(`${API_BASE}/bookings/my-bookings`, {
          headers: getAuthHeaders()
        });
        
        const data = await response.json();
        
        let output = `Status: ${response.ok ? '✅ OK' : '❌ Error'}\n`;
        output += `Response Type: ${data.success ? 'Success' : 'Error'}\n\n`;
        
        if (data.bookings) {
          output += `Bookings Found: ${data.bookings.length}\n\n`;
          if (data.bookings.length > 0) {
            output += `Sample Booking:\n`;
            const booking = data.bookings[0];
            output += JSON.stringify(booking, null, 2);
          }
        } else if (data.data) {
          output += `Data: ${JSON.stringify(data.data, null, 2)}`;
        } else {
          output += `Full Response:\n${JSON.stringify(data, null, 2)}`;
        }
        
        showOutput('bookingsOutput', output, 'success');
      } catch (error) {
        showOutput('bookingsOutput', `Error: ${error.message}`, 'error');
      }
    }

    async function testMySales() {
      try {
        const response = await fetch(`${API_BASE}/bookings/my-sales`, {
          headers: getAuthHeaders()
        });
        
        const data = await response.json();
        
        let output = `Status: ${response.ok ? '✅ OK' : '❌ Error'}\n`;
        output += `Response Type: ${data.success ? 'Success' : 'Error'}\n\n`;
        
        if (data.sales) {
          output += `Sales Found: ${data.sales.length}\n\n`;
          if (data.sales.length > 0) {
            output += `Sample Sale:\n`;
            const sale = data.sales[0];
            output += JSON.stringify(sale, null, 2);
          } else {
            output += `No sales yet`;
          }
        } else if (data.data) {
          output += `Data: ${JSON.stringify(data.data, null, 2)}`;
        } else {
          output += `Full Response:\n${JSON.stringify(data, null, 2)}`;
        }
        
        showOutput('bookingsOutput', output, 'success');
      } catch (error) {
        showOutput('bookingsOutput', `Error: ${error.message}`, 'error');
      }
    }

    async function testReceivedInquiries() {
      try {
        const response = await fetch(`${API_BASE}/inquiries/received`, {
          headers: getAuthHeaders()
        });
        
        const data = await response.json();
        
        let output = `Status: ${response.ok ? '✅ OK' : '❌ Error'}\n`;
        output += `Response Type: ${data.success ? 'Success' : 'Error'}\n\n`;
        
        if (data.data) {
          output += `Inquiries Received: ${data.data.length}\n\n`;
          if (data.data.length > 0) {
            output += `Sample Inquiry:\n`;
            const inquiry = data.data[0];
            output += JSON.stringify(inquiry, null, 2);
          } else {
            output += `No inquiries received yet`;
          }
        } else {
          output += `Full Response:\n${JSON.stringify(data, null, 2)}`;
        }
        
        showOutput('inquiriesOutput', output, 'success');
      } catch (error) {
        showOutput('inquiriesOutput', `Error: ${error.message}`, 'error');
      }
    }

    async function testSentInquiries() {
      try {
        const response = await fetch(`${API_BASE}/inquiries/sent`, {
          headers: getAuthHeaders()
        });
        
        const data = await response.json();
        
        let output = `Status: ${response.ok ? '✅ OK' : '❌ Error'}\n`;
        output += `Response Type: ${data.success ? 'Success' : 'Error'}\n\n`;
        
        if (data.data) {
          output += `Inquiries Sent: ${data.data.length}\n\n`;
          if (data.data.length > 0) {
            output += `Sample Inquiry:\n`;
            const inquiry = data.data[0];
            output += JSON.stringify(inquiry, null, 2);
          } else {
            output += `No inquiries sent yet`;
          }
        } else {
          output += `Full Response:\n${JSON.stringify(data, null, 2)}`;
        }
        
        showOutput('inquiriesOutput', output, 'success');
      } catch (error) {
        showOutput('inquiriesOutput', `Error: ${error.message}`, 'error');
      }
    }

    async function testTransactionHistory() {
      try {
        const response = await fetch(`${API_BASE}/payments/history`, {
          headers: getAuthHeaders()
        });
        
        const data = await response.json();
        
        let output = `Status: ${response.ok ? '✅ OK' : '❌ Error'}\n`;
        output += `Response Type: ${data.success ? 'Success' : 'Error'}\n\n`;
        
        if (data.data) {
          output += `Transactions: ${data.data.length || 0}\n\n`;
          if (data.data && data.data.length > 0) {
            output += `Sample Transaction:\n`;
            const txn = data.data[0];
            output += JSON.stringify(txn, null, 2);
          } else {
            output += `No transactions yet`;
          }
        } else {
          output += `Full Response:\n${JSON.stringify(data, null, 2)}`;
        }
        
        showOutput('transactionsOutput', output, 'success');
      } catch (error) {
        showOutput('transactionsOutput', `Error: ${error.message}`, 'error');
      }
    }

    async function testAutoRefresh() {
      const output = document.getElementById('refreshOutput');
      output.style.display = 'block';
      output.className = 'output info';
      
      let iteration = 0;
      const maxIterations = 6; // 30 seconds with 5 second intervals
      
      const refreshTest = setInterval(async () => {
        iteration++;
        output.innerHTML += `\n${'='.repeat(60)}\nIteration ${iteration} - ${new Date().toLocaleTimeString()}\n${'='.repeat(60)}\n`;
        
        try {
          // Test all endpoints
          const bookingsRes = await fetch(`${API_BASE}/bookings/my-bookings`, { headers: getAuthHeaders() });
          const bookingsData = await bookingsRes.json();
          const bookings = bookingsData.bookings || bookingsData.data || [];
          
          const salesRes = await fetch(`${API_BASE}/bookings/my-sales`, { headers: getAuthHeaders() });
          const salesData = await salesRes.json();
          const sales = salesData.sales || salesData.data || [];
          
          const inquiriesRes = await fetch(`${API_BASE}/inquiries/received`, { headers: getAuthHeaders() });
          const inquiriesData = await inquiriesRes.json();
          const inquiries = inquiriesData.data || [];
          
          const transRes = await fetch(`${API_BASE}/payments/history`, { headers: getAuthHeaders() });
          const transData = await transRes.json();
          const transactions = transData.data || [];
          
          output.innerHTML += `📋 My Bookings: ${bookings.length}\n`;
          output.innerHTML += `💰 My Sales: ${sales.length}\n`;
          output.innerHTML += `📬 Received Inquiries: ${inquiries.length}\n`;
          output.innerHTML += `💳 Transactions: ${transactions.length}\n`;
          
          // Scroll to bottom
          output.parentElement.scrollTop = output.parentElement.scrollHeight;
          
        } catch (error) {
          output.innerHTML += `❌ Error: ${error.message}\n`;
        }
        
        if (iteration >= maxIterations) {
          clearInterval(refreshTest);
          output.innerHTML += `\n${'='.repeat(60)}\n✅ Auto-refresh test completed!\n`;
        }
      });
      
      // Run immediately
      testAutoRefresh.call();
    }

    // Auto-run on load
    window.addEventListener('load', () => {
      console.log('Test page loaded');
      testAuth();
    });
  </script>
</body>
</html>
