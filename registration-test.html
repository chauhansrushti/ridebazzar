<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration & Login Test - RideBazzar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1, h2 {
            color: #333;
            text-align: center;
        }
        .form-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 20px 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin: 5px 0;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #f8f9fa;
            color: #333;
            border: 1px solid #dee2e6;
        }
        .status {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        @media (max-width: 768px) {
            .form-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Registration & Login Test</h1>
        
        <div id="backendStatus" class="status">Checking backend connection...</div>

        <div class="form-section">
            <!-- Registration Form -->
            <div>
                <h2>Register New Account</h2>
                <form id="registrationForm">
                    <div class="form-group">
                        <label for="regUsername">Username:</label>
                        <input type="text" id="regUsername" name="username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="regEmail">Email:</label>
                        <input type="email" id="regEmail" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="regPhone">Phone:</label>
                        <input type="tel" id="regPhone" name="phone" placeholder="10-digit number">
                    </div>
                    
                    <div class="form-group">
                        <label for="regLocation">Location:</label>
                        <input type="text" id="regLocation" name="location" placeholder="City, State">
                    </div>
                    
                    <div class="form-group">
                        <label for="regPassword">Password:</label>
                        <input type="password" id="regPassword" name="password" required minlength="6">
                    </div>
                    
                    <button type="submit">Register Account</button>
                </form>
            </div>

            <!-- Login Form -->
            <div>
                <h2>Login Existing Account</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginUsername">Username:</label>
                        <input type="text" id="loginUsername" name="username" value="admin" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="loginPassword">Password:</label>
                        <input type="password" id="loginPassword" name="password" value="admin123" required>
                    </div>
                    
                    <button type="submit">Login</button>
                </form>
            </div>
        </div>

        <div class="container">
            <h2>Quick Tests</h2>
            <button onclick="testHealthAPI()">Test Health API</button>
            <button onclick="testCORS()">Test CORS</button>
            <button onclick="generateSampleData()">Generate Sample Registration Data</button>
        </div>
        
        <div id="result"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        const resultDiv = document.getElementById('result');

        function showResult(message, type = 'info') {
            resultDiv.textContent = message;
            resultDiv.className = `result ${type}`;
            resultDiv.scrollTop = resultDiv.scrollHeight;
        }

        // Check backend status on page load
        async function checkBackendStatus() {
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                const data = await response.json();
                
                document.getElementById('backendStatus').innerHTML = '✅ Backend Connected - Ready for Registration & Login';
                document.getElementById('backendStatus').className = 'status connected';
                return true;
            } catch (error) {
                document.getElementById('backendStatus').innerHTML = '❌ Backend Disconnected - Registration will fail';
                document.getElementById('backendStatus').className = 'status disconnected';
                return false;
            }
        }

        // Test health API
        async function testHealthAPI() {
            try {
                showResult('Testing health endpoint...');
                const response = await fetch(`${API_BASE_URL}/health`);
                const data = await response.json();
                
                showResult(`✅ Health API Success!\n\nStatus: ${response.status}\nResponse: ${JSON.stringify(data, null, 2)}`, 'success');
            } catch (error) {
                showResult(`❌ Health API Failed!\n\nError: ${error.message}\n\nBackend server may not be running on port 5000`, 'error');
            }
        }

        // Test CORS
        async function testCORS() {
            try {
                showResult('Testing CORS configuration...');
                
                const response = await fetch(`${API_BASE_URL}/health`, {
                    method: 'OPTIONS'
                });
                
                showResult(`✅ CORS Test Success!\n\nStatus: ${response.status}\nThis means cross-origin requests should work`, 'success');
            } catch (error) {
                showResult(`❌ CORS Test Failed!\n\nError: ${error.message}\n\nThis is likely why registration is failing`, 'error');
            }
        }

        // Generate sample registration data
        function generateSampleData() {
            const randomNum = Math.floor(Math.random() * 1000);
            document.getElementById('regUsername').value = `user${randomNum}`;
            document.getElementById('regEmail').value = `user${randomNum}@example.com`;
            document.getElementById('regPhone').value = `9876543${String(randomNum).padStart(3, '0')}`;
            document.getElementById('regLocation').value = 'Mumbai, Maharashtra';
            document.getElementById('regPassword').value = 'password123';
            
            showResult(`✅ Sample data generated!\n\nUsername: user${randomNum}\nEmail: user${randomNum}@example.com\nPassword: password123\n\nYou can now click "Register Account" to test`, 'success');
        }

        // Handle registration
        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const userData = {
                username: formData.get('username'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                location: formData.get('location'),
                password: formData.get('password'),
                fullName: formData.get('username') // Use username as full name
            };

            showResult('🔄 Registering new account...\n\nSending request to: ' + API_BASE_URL + '/auth/register');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(userData),
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    showResult(`✅ Registration Successful!\n\nUser: ${result.user?.username}\nEmail: ${result.user?.email}\nMessage: ${result.message}\n\nFull Response:\n${JSON.stringify(result, null, 2)}`, 'success');
                } else {
                    showResult(`❌ Registration Failed!\n\nStatus: ${response.status}\nError: ${result.message || 'Unknown error'}\n\nFull Response:\n${JSON.stringify(result, null, 2)}`, 'error');
                }
            } catch (error) {
                showResult(`❌ Registration Request Failed!\n\nError: ${error.message}\n\nPossible causes:\n1. Backend server not running\n2. CORS blocking the request\n3. Network connectivity issues\n4. API endpoint not available\n\nTry running the Health API test first`, 'error');
            }
        });

        // Handle login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const credentials = {
                username: formData.get('username'),
                password: formData.get('password')
            };

            showResult('🔄 Logging in...\n\nSending request to: ' + API_BASE_URL + '/auth/login');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(credentials),
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    showResult(`✅ Login Successful!\n\nUser: ${result.user?.username}\nToken received: ${result.token ? 'Yes' : 'No'}\nMessage: ${result.message}\n\nFull Response:\n${JSON.stringify(result, null, 2)}`, 'success');
                } else {
                    showResult(`❌ Login Failed!\n\nStatus: ${response.status}\nError: ${result.message || 'Unknown error'}\n\nFull Response:\n${JSON.stringify(result, null, 2)}`, 'error');
                }
            } catch (error) {
                showResult(`❌ Login Request Failed!\n\nError: ${error.message}\n\nSame issue as registration - check backend connectivity`, 'error');
            }
        });

        // Check backend status on page load
        window.addEventListener('load', () => {
            checkBackendStatus();
            // Auto-generate sample data
            setTimeout(generateSampleData, 1000);
        });
    </script>
</body>
</html>
