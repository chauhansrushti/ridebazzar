<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - RideBazzar</title>
    <link rel="icon" type="image/png" href="images/logotab.png" sizes="16x16" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .messages-container {
            height: calc(100vh - 140px);
            display: flex;
        }

        .conversations-sidebar {
            width: 350px;
            border-right: 1px solid #dee2e6;
            background: #f8f9fa;
            overflow-y: auto;
        }

        .conversation-item {
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .conversation-item:hover {
            background-color: #e9ecef;
        }

        .conversation-item.active {
            background-color: #007bff;
            color: white;
        }

        .conversation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .conversation-meta {
            font-size: 0.875rem;
            opacity: 0.7;
            margin-top: 5px;
        }

        .unread-badge {
            background-color: #dc3545;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 0.75rem;
            min-width: 20px;
            text-align: center;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #dee2e6;
            background: white;
        }

        .messages-container-inner {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
        }

        .message.own {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.own .message-bubble {
            background-color: #007bff;
            color: white;
        }

        .message.other .message-bubble {
            background-color: white;
            border: 1px solid #dee2e6;
        }

        .message.system .message-bubble {
            background-color: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            max-width: 100%;
            text-align: center;
            font-style: italic;
        }

        .message-time {
            font-size: 0.75rem;
            opacity: 0.6;
            margin-top: 5px;
        }

        .message-input-area {
            padding: 15px 20px;
            border-top: 1px solid #dee2e6;
            background: white;
        }

        .message-input-container {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            border: 1px solid #dee2e6;
            border-radius: 20px;
            padding: 10px 15px;
            resize: none;
            max-height: 100px;
        }

        .send-button {
            background-color: #007bff;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #6c757d;
        }

        .quick-reply-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .quick-reply-btn {
            padding: 6px 12px;
            background: #e9ecef;
            border: 1px solid #dee2e6;
            border-radius: 15px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-reply-btn:hover {
            background: #dee2e6;
        }

        .car-info-card {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
        }

        .car-info-image {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
        }

        .search-conversations {
            padding: 15px;
            border-bottom: 1px solid #dee2e6;
        }

        .no-conversations {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
        }

        @media (max-width: 768px) {
            .conversations-sidebar {
                width: 100%;
                position: absolute;
                z-index: 10;
                height: 100%;
                transform: translateX(-100%);
                transition: transform 0.3s;
            }

            .conversations-sidebar.show {
                transform: translateX(0);
            }

            .chat-area {
                width: 100%;
            }

            .mobile-toggle {
                display: block !important;
            }
        }

        .mobile-toggle {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="top-navbar">
        <div class="logo-location">
            <img src="images/logo.png" alt="logo" style="height: 40px; width: auto;">
        </div>
        <div class="navbar-right">
            <a href="home.html">Home</a>
            <a href="all-cars.html">Buy Car</a>
            <a href="post-car.html">Sell Car</a>
            <a href="compare.html">Compare</a>
            <a href="dashboard.html" id="profileNavBtn" style="display:none;">Dashboard</a>
            <a href="messages.html" class="active">
                Messages
                <span id="notificationBadge" class="badge bg-danger ms-1" style="display: none;">0</span>
            </a>
            <a href="#" id="loginNavBtn" onclick="showLoginModal()">Login/Register</a>
            <a href="#" id="logoutNavBtn" onclick="logoutUser()" style="display:none;">Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid px-0">
        <div class="messages-container">
            <!-- Conversations Sidebar -->
            <div class="conversations-sidebar" id="conversationsSidebar">
                <div class="search-conversations">
                    <div class="input-group">
                        <input type="text" class="form-control" id="conversationSearch" 
                               placeholder="Search conversations...">
                        <button class="btn btn-outline-secondary mobile-toggle" onclick="toggleSidebar()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div id="conversationsList">
                    <!-- Conversations will be loaded here -->
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <div class="chat-header d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <button class="btn btn-link mobile-toggle me-2" onclick="toggleSidebar()">
                            <i class="fas fa-bars"></i>
                        </button>
                        <div id="chatHeaderInfo">
                            <h6 class="mb-0">Select a conversation</h6>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="btn btn-sm btn-outline-danger" id="deleteConversationBtn" 
                                style="display: none;" onclick="deleteCurrentConversation()">
                            <i class="fas fa-trash me-1"></i>Delete
                        </button>
                    </div>
                </div>

                <div id="chatContent" class="d-flex align-items-center justify-content-center h-100">
                    <div class="empty-state">
                        <i class="fas fa-comments fa-3x mb-3"></i>
                        <h5>Welcome to Messages</h5>
                        <p>Select a conversation to start messaging</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Reply Templates Modal -->
    <div class="modal fade" id="quickReplyModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Quick Reply Templates</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="list-group" id="quickReplyList">
                        <!-- Templates will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal fade" id="confirmationModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmationTitle">Confirm Action</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="confirmationMessage">
                    Are you sure you want to proceed?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="confirmationConfirm">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/carManager.js"></script>
    <script src="js/messaging.js"></script>
    <script>
        let currentConversationId = null;
        let currentCar = null;

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            authManager.checkAuthAndRedirect();
            authManager.updateNavbar();
            loadConversations();
            setupEventListeners();
        });

        // Setup event listeners
        function setupEventListeners() {
            // Search conversations
            document.getElementById('conversationSearch').addEventListener('input', filterConversations);

            // Auto-resize message input
            const messageInput = document.getElementById('messageInput');
            if (messageInput) {
                messageInput.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
                });

                // Send message on Enter (but allow Shift+Enter for new lines)
                messageInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
            }
        }

        // Load conversations
        function loadConversations() {
            const currentUser = localStorage.getItem('ridebazzar_user');
            if (!currentUser) return;

            const conversations = getUserConversations();
            const conversationsList = document.getElementById('conversationsList');

            if (conversations.length === 0) {
                conversationsList.innerHTML = `
                    <div class="no-conversations">
                        <i class="fas fa-inbox fa-2x mb-3"></i>
                        <p>No conversations yet</p>
                        <small>Start by inquiring about a car</small>
                    </div>
                `;
                return;
            }

            conversationsList.innerHTML = conversations.map(conv => {
                const otherParticipant = conv.participants.find(p => p !== currentUser);
                const lastMessage = conv.messages[conv.messages.length - 1];
                const unreadCount = conv.unreadCounts[currentUser] || 0;

                return `
                    <div class="conversation-item" onclick="selectConversation('${conv.id}')" 
                         data-conversation-id="${conv.id}">
                        <div class="conversation-header">
                            <div class="d-flex align-items-center">
                                <div class="avatar-circle me-3">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div>
                                    <div class="fw-bold">${otherParticipant}</div>
                                    <div class="text-muted small">
                                        ${conv.carInfo ? `${conv.carInfo.make} ${conv.carInfo.model}` : 'General'}
                                    </div>
                                </div>
                            </div>
                            ${unreadCount > 0 ? `<span class="unread-badge">${unreadCount}</span>` : ''}
                        </div>
                        
                        ${lastMessage ? `
                            <div class="conversation-meta">
                                <div class="text-truncate">
                                    ${lastMessage.type === 'system' ? '<i class="fas fa-info-circle me-1"></i>' : ''}
                                    ${lastMessage.text.length > 50 ? lastMessage.text.substring(0, 50) + '...' : lastMessage.text}
                                </div>
                                <small class="text-muted">${formatMessageTime(lastMessage.timestamp)}</small>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        // Filter conversations
        function filterConversations() {
            const searchTerm = document.getElementById('conversationSearch').value.toLowerCase();
            const conversations = document.querySelectorAll('.conversation-item');

            conversations.forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(searchTerm) ? 'block' : 'none';
            });
        }

        // Select conversation
        function selectConversation(conversationId) {
            const currentUser = localStorage.getItem('ridebazzar_user');
            const conversations = getUserConversations();
            const conversation = conversations.find(conv => conv.id === conversationId);

            if (!conversation) return;

            currentConversationId = conversationId;
            currentCar = conversation.carInfo;

            // Update active conversation in sidebar
            document.querySelectorAll('.conversation-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`[data-conversation-id="${conversationId}"]`).classList.add('active');

            // Mark messages as read
            messagingManager.markMessagesAsRead(conversationId, currentUser);

            // Update chat header
            const otherParticipant = conversation.participants.find(p => p !== currentUser);
            document.getElementById('chatHeaderInfo').innerHTML = `
                <h6 class="mb-0">${otherParticipant}</h6>
                ${conversation.carInfo ? `
                    <small class="text-muted">
                        <i class="fas fa-car me-1"></i>
                        ${conversation.carInfo.make} ${conversation.carInfo.model} ${conversation.carInfo.year}
                    </small>
                ` : ''}
            `;

            // Show delete button
            document.getElementById('deleteConversationBtn').style.display = 'block';

            // Load messages
            loadMessages(conversation);

            // Hide sidebar on mobile
            if (window.innerWidth <= 768) {
                document.getElementById('conversationsSidebar').classList.remove('show');
            }
        }

        // Load messages for conversation
        function loadMessages(conversation) {
            const currentUser = localStorage.getItem('ridebazzar_user');
            const chatContent = document.getElementById('chatContent');

            chatContent.innerHTML = `
                ${conversation.carInfo ? `
                    <div class="car-info-card">
                        <img src="${conversation.carInfo.image || 'images/placeholder-car.jpg'}" 
                             alt="Car" class="car-info-image">
                        <div>
                            <div class="fw-bold">${conversation.carInfo.make} ${conversation.carInfo.model} ${conversation.carInfo.year}</div>
                            <div class="text-primary fw-bold">${carManager.formatPrice(conversation.carInfo.price)}</div>
                        </div>
                    </div>
                ` : ''}
                
                <div class="messages-container-inner" id="messagesContainer">
                    ${conversation.messages.map(message => {
                        const isOwn = message.senderId === currentUser;
                        const isSystem = message.senderId === 'system';
                        
                        return `
                            <div class="message ${isOwn ? 'own' : isSystem ? 'system' : 'other'}">
                                <div class="message-bubble">
                                    ${message.text}
                                    <div class="message-time">
                                        ${formatMessageTime(message.timestamp)}
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>

                ${conversation.carInfo && !isCarSold(conversation.carId) ? `
                    <div class="quick-reply-buttons">
                        <button class="quick-reply-btn" onclick="insertQuickReply('interest')">
                            <i class="fas fa-heart me-1"></i>Still Available?
                        </button>
                        <button class="quick-reply-btn" onclick="insertQuickReply('priceInquiry')">
                            <i class="fas fa-tag me-1"></i>Best Price?
                        </button>
                        <button class="quick-reply-btn" onclick="insertQuickReply('testDrive')">
                            <i class="fas fa-calendar me-1"></i>Test Drive
                        </button>
                        <button class="quick-reply-btn" onclick="insertQuickReply('inspection')">
                            <i class="fas fa-search me-1"></i>Inspection
                        </button>
                    </div>
                ` : ''}

                <div class="message-input-area">
                    <div class="message-input-container">
                        <textarea class="message-input" id="messageInput" 
                                  placeholder="Type your message..." rows="1"></textarea>
                        <button class="send-button" onclick="sendMessage()">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            `;

            // Scroll to bottom
            const messagesContainer = document.getElementById('messagesContainer');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            // Setup message input auto-resize
            setupEventListeners();
            
            // Update sidebar to remove unread badge
            loadConversations();
        }

        // Send message
        function sendMessage() {
            if (!currentConversationId) return;

            const messageInput = document.getElementById('messageInput');
            const messageText = messageInput.value.trim();

            if (!messageText) return;

            try {
                sendCarMessage(currentConversationId, messageText);
                messageInput.value = '';
                messageInput.style.height = 'auto';

                // Reload conversation to show new message
                const conversations = getUserConversations();
                const conversation = conversations.find(conv => conv.id === currentConversationId);
                if (conversation) {
                    loadMessages(conversation);
                }

                // Update conversations list
                loadConversations();

            } catch (error) {
                showAlert('Error sending message: ' + error.message, 'danger');
            }
        }

        // Insert quick reply
        function insertQuickReply(templateKey) {
            if (!currentCar) return;

            const template = getMessageTemplate(templateKey, currentCar);
            document.getElementById('messageInput').value = template;
            document.getElementById('messageInput').focus();
        }

        // Check if car is sold
        function isCarSold(carId) {
            const car = carManager.getCarById(carId);
            return car && car.status === 'sold';
        }

        // Delete current conversation
        function deleteCurrentConversation() {
            if (!currentConversationId) return;

            showConfirmation(
                'Delete Conversation',
                'Are you sure you want to delete this conversation? This action cannot be undone.',
                () => {
                    try {
                        const currentUser = localStorage.getItem('ridebazzar_user');
                        messagingManager.deleteConversation(currentConversationId, currentUser);
                        
                        // Reset UI
                        currentConversationId = null;
                        currentCar = null;
                        
                        document.getElementById('chatContent').innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-comments fa-3x mb-3"></i>
                                <h5>Welcome to Messages</h5>
                                <p>Select a conversation to start messaging</p>
                            </div>
                        `;
                        
                        document.getElementById('deleteConversationBtn').style.display = 'none';
                        
                        // Reload conversations
                        loadConversations();
                        
                        showAlert('Conversation deleted successfully', 'success');
                        
                    } catch (error) {
                        showAlert('Error deleting conversation: ' + error.message, 'danger');
                    }
                }
            );
        }

        // Toggle sidebar for mobile
        function toggleSidebar() {
            document.getElementById('conversationsSidebar').classList.toggle('show');
        }

        // Show confirmation modal
        function showConfirmation(title, message, onConfirm) {
            document.getElementById('confirmationTitle').textContent = title;
            document.getElementById('confirmationMessage').textContent = message;
            
            const confirmBtn = document.getElementById('confirmationConfirm');
            confirmBtn.onclick = () => {
                const modal = bootstrap.Modal.getInstance(document.getElementById('confirmationModal'));
                modal.hide();
                onConfirm();
            };
            
            new bootstrap.Modal(document.getElementById('confirmationModal')).show();
        }

        // Show alert
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show position-fixed`;
            alertDiv.style.cssText = 'top: 80px; right: 20px; z-index: 1050; max-width: 400px;';
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            document.body.appendChild(alertDiv);
            
            setTimeout(() => {
                if (alertDiv.parentElement) {
                    alertDiv.remove();
                }
            }, 5000);
        }

        // URL parameter handling for direct conversation access
        function checkURLParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const conversationId = urlParams.get('conversation');
            
            if (conversationId) {
                const conversations = getUserConversations();
                const conversation = conversations.find(conv => conv.id === conversationId);
                if (conversation) {
                    selectConversation(conversationId);
                }
            }
        }

        // Initialize URL params check
        document.addEventListener('DOMContentLoaded', checkURLParams);
    </script>
</body>
</html>
