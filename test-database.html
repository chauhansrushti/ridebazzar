<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Integration Test - RideBazzar</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 32px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .status-section {
      margin-bottom: 30px;
      padding: 20px;
      border-radius: 10px;
      background: #f8f9fa;
    }
    .status-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    .status-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .status-icon.success { background: #d4edda; color: #28a745; }
    .status-icon.error { background: #f8d7da; color: #dc3545; }
    .status-icon.pending { background: #fff3cd; color: #ffc107; }
    .status-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }
    .status-content {
      padding-left: 50px;
      color: #666;
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #dee2e6;
    }
    th {
      background: #667eea;
      color: white;
      font-weight: 600;
    }
    tr:hover {
      background: #f8f9fa;
    }
    .btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-right: 10px;
    }
    .btn:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
    }
    .btn:active {
      transform: translateY(0);
    }
    .btn-group {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-success { background: #d4edda; color: #28a745; }
    .badge-warning { background: #fff3cd; color: #856404; }
    .badge-danger { background: #f8d7da; color: #721c24; }
    .loading {
      text-align: center;
      padding: 20px;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><i class="material-icons">search</i> Database Integration Test</h1>
    <p class="subtitle">Test if all data is being saved to MySQL database</p>

    <!-- Backend Status -->
    <div class="status-section">
      <div class="status-header">
        <div class="status-icon pending" id="backendStatusIcon">⏳</div>
        <div class="status-title">Backend Server Status</div>
      </div>
      <div class="status-content" id="backendStatus">Checking...</div>
    </div>

    <!-- Auth Status -->
    <div class="status-section">
      <div class="status-header">
        <div class="status-icon pending" id="authStatusIcon">⏳</div>
        <div class="status-title">Authentication Status</div>
      </div>
      <div class="status-content" id="authStatus">Checking login status...</div>
    </div>

    <!-- Test Controls -->
    <div class="btn-group">
      <button class="btn" onclick="testBackendConnection()">🔄 Test Backend</button>
      <button class="btn" onclick="fetchAllUsers()">👥 Show Users</button>
      <button class="btn" onclick="fetchAllCars()"><i class="material-icons">directions_car</i> Show Cars</button>
      <button class="btn" onclick="fetchAllBookings()"><i class="material-icons">assignment</i> Show Bookings</button>
      <button class="btn" onclick="fetchAllTransactions()"><i class="material-icons">credit_card</i> Show Transactions</button>
    </div>

    <!-- Data Display -->
    <div id="dataDisplay"></div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api';
    
    // Check backend status on load
    window.onload = function() {
      testBackendConnection();
      checkAuthStatus();
    };

    function getAuthHeaders() {
      const token = localStorage.getItem('authToken');
      return token ? { 'Authorization': `Bearer ${token}` } : {};
    }

    async function testBackendConnection() {
      try {
        const response = await fetch(`${API_URL}/health`);
        const data = await response.json();
        
        if (data.success) {
          document.getElementById('backendStatusIcon').className = 'status-icon success';
          document.getElementById('backendStatusIcon').textContent = '✅';
          document.getElementById('backendStatus').innerHTML = `
            <strong>✅ Backend is running</strong><br>
            Database: ${data.data.database}<br>
            Server Time: ${new Date(data.data.serverTime).toLocaleString()}
          `;
        }
      } catch (error) {
        document.getElementById('backendStatusIcon').className = 'status-icon error';
        document.getElementById('backendStatusIcon').textContent = '❌';
        document.getElementById('backendStatus').innerHTML = `
          <strong>❌ Backend server is not running</strong><br>
          Error: ${error.message}<br>
          Please start the backend server: <code>cd backend && node server.js</code>
        `;
      }
    }

    function checkAuthStatus() {
      const token = localStorage.getItem('authToken');
      const userData = localStorage.getItem('userData');
      
      if (token && userData) {
        const user = JSON.parse(userData);
        document.getElementById('authStatusIcon').className = 'status-icon success';
        document.getElementById('authStatusIcon').textContent = '✅';
        document.getElementById('authStatus').innerHTML = `
          <strong>✅ Logged in as: ${user.username || user.name}</strong><br>
          Email: ${user.email || 'N/A'}
        `;
      } else {
        document.getElementById('authStatusIcon').className = 'status-icon error';
        document.getElementById('authStatusIcon').textContent = '❌';
        document.getElementById('authStatus').innerHTML = `
          <strong>❌ Not logged in</strong><br>
          Please <a href="home.html">login here</a> to test authenticated features
        `;
      }
    }

    async function fetchAllUsers() {
      showLoading();
      try {
        const response = await fetch(`${API_URL}/auth/users`, {
          headers: getAuthHeaders()
        });
        const data = await response.json();
        
        if (data.success && data.data && data.data.length > 0) {
          displayUsersTable(data.data);
        } else {
          showEmptyState('No users found in database');
        }
      } catch (error) {
        showError('Failed to fetch users: ' + error.message);
      }
    }

    async function fetchAllCars() {
      showLoading();
      try {
        const response = await fetch(`${API_URL}/cars`);
        const data = await response.json();
        
        if (data.success && data.data && data.data.cars && data.data.cars.length > 0) {
          displayCarsTable(data.data.cars);
        } else {
          showEmptyState('No cars found in database. Post a car to see data here.');
        }
      } catch (error) {
        showError('Failed to fetch cars: ' + error.message);
      }
    }

    async function fetchAllBookings() {
      showLoading();
      try {
        const response = await fetch(`${API_URL}/bookings/my-bookings`, {
          headers: getAuthHeaders()
        });
        const data = await response.json();
        
        if (data.success && data.data && data.data.length > 0) {
          displayBookingsTable(data.data);
        } else {
          showEmptyState('No bookings found. Book a car to see transactions here.');
        }
      } catch (error) {
        showError('Failed to fetch bookings: ' + error.message);
      }
    }

    async function fetchAllTransactions() {
      showLoading();
      try {
        const response = await fetch(`${API_URL}/payments/history`, {
          headers: getAuthHeaders()
        });
        const data = await response.json();
        
        if (data.success && data.data && data.data.transactions && data.data.transactions.length > 0) {
          displayTransactionsTable(data.data.transactions);
        } else {
          showEmptyState('No transactions found. Complete a payment to see transactions here.');
        }
      } catch (error) {
        showError('Failed to fetch transactions: ' + error.message);
      }
    }

    function displayUsersTable(users) {
      let html = `
        <h2>👥 Users in Database (${users.length})</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Email</th>
              <th>Full Name</th>
              <th>Phone</th>
              <th>Created At</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      users.forEach(user => {
        html += `
          <tr>
            <td>${user.id}</td>
            <td>${user.username}</td>
            <td>${user.email}</td>
            <td>${user.full_name || 'N/A'}</td>
            <td>${user.phone || 'N/A'}</td>
            <td>${new Date(user.created_at).toLocaleString()}</td>
          </tr>
        `;
      });
      
      html += '</tbody></table>';
      document.getElementById('dataDisplay').innerHTML = html;
    }

    function displayCarsTable(cars) {
      let html = `
        <h2><i class="material-icons">directions_car</i> Cars in Database (${cars.length})</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Make & Model</th>
              <th>Year</th>
              <th>Price</th>
              <th>Status</th>
              <th>Seller ID</th>
              <th>Posted At</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      cars.forEach(car => {
        html += `
          <tr>
            <td>${car.id}</td>
            <td>${car.make} ${car.model}</td>
            <td>${car.year}</td>
            <td>₹${Number(car.price).toLocaleString()}</td>
            <td><span class="badge badge-${car.status === 'available' ? 'success' : 'warning'}">${car.status}</span></td>
            <td>${car.seller_id}</td>
            <td>${new Date(car.created_at).toLocaleString()}</td>
          </tr>
        `;
      });
      
      html += '</tbody></table>';
      document.getElementById('dataDisplay').innerHTML = html;
    }

    function displayBookingsTable(bookings) {
      let html = `
        <h2><i class="material-icons">assignment</i> Bookings in Database (${bookings.length})</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Car ID</th>
              <th>Booking Amount</th>
              <th>Total Amount</th>
              <th>Status</th>
              <th>Inspection Date</th>
              <th>Created At</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      bookings.forEach(booking => {
        html += `
          <tr>
            <td>${booking.id}</td>
            <td>${booking.car_id}</td>
            <td>₹${Number(booking.booking_amount).toLocaleString()}</td>
            <td>₹${Number(booking.total_amount).toLocaleString()}</td>
            <td><span class="badge badge-${booking.status === 'confirmed' ? 'success' : 'warning'}">${booking.status}</span></td>
            <td>${booking.inspection_date || 'N/A'}</td>
            <td>${new Date(booking.created_at).toLocaleString()}</td>
          </tr>
        `;
      });
      
      html += '</tbody></table>';
      document.getElementById('dataDisplay').innerHTML = html;
    }

    function displayTransactionsTable(transactions) {
      let html = `
        <h2><i class="material-icons">credit_card</i> Transactions in Database (${transactions.length})</h2>
        <table>
          <thead>
            <tr>
              <th>Transaction ID</th>
              <th>Booking ID</th>
              <th>Amount</th>
              <th>Payment Method</th>
              <th>Status</th>
              <th>EMI</th>
              <th>Created At</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      transactions.forEach(txn => {
        html += `
          <tr>
            <td>${txn.id}</td>
            <td>${txn.booking_id}</td>
            <td>₹${Number(txn.amount).toLocaleString()}</td>
            <td>${txn.payment_method.toUpperCase()}</td>
            <td><span class="badge badge-${txn.payment_status === 'success' ? 'success' : txn.payment_status === 'pending' ? 'warning' : 'danger'}">${txn.payment_status}</span></td>
            <td>${txn.emi_enabled ? '✅ Yes' : '❌ No'}</td>
            <td>${new Date(txn.created_at).toLocaleString()}</td>
          </tr>
        `;
      });
      
      html += '</tbody></table>';
      document.getElementById('dataDisplay').innerHTML = html;
    }

    function showLoading() {
      document.getElementById('dataDisplay').innerHTML = '<div class="loading">⏳ Loading data from database...</div>';
    }

    function showEmptyState(message) {
      document.getElementById('dataDisplay').innerHTML = `<div class="empty-state">📭 ${message}</div>`;
    }

    function showError(message) {
      document.getElementById('dataDisplay').innerHTML = `<div class="empty-state" style="color:#dc3545;">❌ ${message}</div>`;
    }
  </script>
</body>
</html>
