<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Debug - Bookings API Data</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
    }
    h1 {
      color: #333;
    }
    .section {
      margin: 20px 0;
      padding: 15px;
      background: #f9f9f9;
      border-left: 4px solid #007bff;
      border-radius: 4px;
    }
    .section h2 {
      margin-top: 0;
      color: #007bff;
    }
    pre {
      background: #222;
      color: #0f0;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
      font-family: monospace;
    }
    .button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px 5px 5px 0;
    }
    .button:hover {
      background: #0056b3;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 15px;
      border-radius: 4px;
      margin: 10px 0;
    }
    .success {
      background: #d4edda;
      color: #155724;
      padding: 15px;
      border-radius: 4px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 Bookings API Debug</h1>
    
    <div class="section">
      <h2>1. Check Authentication</h2>
      <button class="button" onclick="checkAuth()">Check Token & User</button>
      <div id="authOutput"></div>
    </div>

    <div class="section">
      <h2>2. Fetch My Sales Data</h2>
      <button class="button" onclick="fetchMySales()">Fetch My Sales</button>
      <div id="salesOutput"></div>
    </div>

    <div class="section">
      <h2>3. Fetch My Bookings Data</h2>
      <button class="button" onclick="fetchMyBookings()">Fetch My Bookings</button>
      <div id="bookingsOutput"></div>
    </div>

    <div class="section">
      <h2>4. Raw API Response</h2>
      <button class="button" onclick="fetchRawSales()">Get Raw Sales JSON</button>
      <div id="rawSalesOutput"></div>
    </div>
  </div>

  <script>
    function showOutput(elementId, content, isError = false) {
      const element = document.getElementById(elementId);
      element.innerHTML = `<pre style="color: ${isError ? '#d00' : '#0f0'}">${content}</pre>`;
    }

    function checkAuth() {
      const token = localStorage.getItem('authToken');
      const userData = localStorage.getItem('userData');
      
      let output = '';
      output += `Token: ${token ? '✅ Present' : '❌ Missing'}\n`;
      output += `Token Length: ${token ? token.length : 0}\n`;
      output += `User Data: ${userData ? '✅ Present' : '❌ Missing'}\n\n`;
      
      if (userData) {
        try {
          const user = JSON.parse(userData);
          output += 'User Details:\n';
          output += JSON.stringify(user, null, 2);
        } catch (e) {
          output += `Error parsing user data: ${e.message}`;
        }
      }
      
      document.getElementById('authOutput').innerHTML = `<div class="success">${output.replace(/\n/g, '<br>')}</div>`;
    }

    async function fetchMySales() {
      try {
        const token = localStorage.getItem('authToken');
        if (!token) {
          document.getElementById('salesOutput').innerHTML = '<div class="error">❌ No auth token found</div>';
          return;
        }

        const response = await fetch('http://localhost:5000/api/bookings/my-sales', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const data = await response.json();
        
        let output = '';
        if (data.success) {
          output += `✅ Success\n`;
          output += `Sales Count: ${data.sales ? data.sales.length : 0}\n\n`;
          
          if (data.sales && data.sales.length > 0) {
            output += `First Sale Fields:\n`;
            const firstSale = data.sales[0];
            output += Object.keys(firstSale).sort().join('\n') + '\n\n';
            output += `First Sale Data:\n`;
            output += JSON.stringify(firstSale, null, 2);
          } else {
            output += 'No sales data available\n';
          }
        } else {
          output += `❌ Error: ${data.message}`;
        }

        showOutput('salesOutput', output, !data.success);
      } catch (error) {
        showOutput('salesOutput', `❌ Fetch Error: ${error.message}`, true);
      }
    }

    async function fetchMyBookings() {
      try {
        const token = localStorage.getItem('authToken');
        if (!token) {
          document.getElementById('bookingsOutput').innerHTML = '<div class="error">❌ No auth token found</div>';
          return;
        }

        const response = await fetch('http://localhost:5000/api/bookings/my-bookings', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const data = await response.json();
        
        let output = '';
        if (data.success) {
          output += `✅ Success\n`;
          output += `Bookings Count: ${data.bookings ? data.bookings.length : 0}\n\n`;
          
          if (data.bookings && data.bookings.length > 0) {
            output += `First Booking Fields:\n`;
            const firstBooking = data.bookings[0];
            output += Object.keys(firstBooking).sort().join('\n') + '\n\n';
            output += `First Booking Data:\n`;
            output += JSON.stringify(firstBooking, null, 2);
          } else {
            output += 'No bookings data available\n';
          }
        } else {
          output += `❌ Error: ${data.message}`;
        }

        showOutput('bookingsOutput', output, !data.success);
      } catch (error) {
        showOutput('bookingsOutput', `❌ Fetch Error: ${error.message}`, true);
      }
    }

    async function fetchRawSales() {
      try {
        const token = localStorage.getItem('authToken');
        if (!token) {
          document.getElementById('rawSalesOutput').innerHTML = '<div class="error">❌ No auth token found</div>';
          return;
        }

        const response = await fetch('http://localhost:5000/api/bookings/my-sales', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const data = await response.json();
        showOutput('rawSalesOutput', JSON.stringify(data, null, 2), !data.success);
      } catch (error) {
        showOutput('rawSalesOutput', `❌ Fetch Error: ${error.message}`, true);
      }
    }

    // Auto-check auth on load
    window.addEventListener('load', checkAuth);
  </script>
</body>
</html>
