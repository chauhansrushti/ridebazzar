<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Cars - RideBazzar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <link rel="icon" type="image/png" href="images/logotab.png" sizes="16x16" />  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">  <link rel="stylesheet" href="css/index.css" />
  <style>
    .material-icons {
      font-family: 'Material Icons';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      display: inline-flex;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }

    /* Container and Base */
    .container {
      margin: 0 auto;
      padding: 0 20px;
    }

    .container h2 {
      margin: 20px 0;
      font-size: 28px;
    }

    /* Search Bar Responsive */
    @media (max-width: 900px) {
      .container {
        max-width: 100% !important;
      }

      .container h2 {
        font-size: 24px;
        margin: 15px 0;
      }

      .search-bar-container {
        margin: 20px auto;
      }

      .search-bar-container > div {
        max-width: 100% !important;
      }

      .search-bar-container input {
        font-size: 14px !important;
      }
    }

    @media (max-width: 768px) {
      .container {
        margin: 0 auto;
        padding: 0 15px;
      }

      .container h2 {
        font-size: 20px;
        margin: 15px 0;
      }

      .search-bar-container {
        margin: 15px auto 20px;
      }

      .search-bar-container > div {
        max-width: 100%;
        flex-direction: column;
      }

      .search-bar-container input {
        width: 100% !important;
        font-size: 14px;
      }

      .search-bar-container button {
        width: 100%;
        margin-top: 8px;
      }

      /* Filters */
      #filtersContent > div:nth-child(1) {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      #filtersContent > div:nth-child(2) {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      select, input[type="text"], input[type="number"] {
        font-size: 13px !important;
      }

      .sort-controls {
        flex-direction: column;
        align-items: flex-start;
      }

      .sort-controls > div {
        width: 100%;
        flex-direction: column;  
        margin-bottom: 10px;
      }

      .sort-controls select {
        width: 100%;
      }

      #allCarsList {
        gap: 15px !important;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 0 10px;
        margin: 10px auto;
      }

      .container h2 {
        font-size: 18px;
        margin: 12px 0;
      }

      .search-bar-container {
        margin: 12px auto 15px;
      }

      .search-bar-container > div {
        border-radius: 20px;
        padding: 3px 8px;
      }

      .search-bar-container input {
        padding: 10px !important;
        width: 100% !important;
        font-size: 13px !important;
      }

      .search-bar-container button {
        padding: 10px !important;
      }

      .search-bar-container .material-icons {
        font-size: 18px;
      }

      /* Filter Styling */
      .filter-header {
        flex-direction: column !important;
        align-items: flex-start !important;
        margin-bottom: 10px;
      }

      .filter-toggle {
        width: 100%;
      }

      #filtersContent > div:nth-child(1) {
        grid-template-columns: 1fr !important;
        gap: 10px !important;
        margin-bottom: 10px !important;
      }

      #filtersContent > div:nth-child(2) {
        grid-template-columns: 1fr 1fr !important;
        gap: 8px !important;
        margin-bottom: 10px !important;
      }

      #filtersContent select, 
      #filtersContent input {
        font-size: 12px !important;
        padding: 8px !important;
      }

      #filtersContent label {
        font-size: 12px !important;
        margin-bottom: 3px !important;
      }

      .filter-buttons {
        display: flex !important;
        gap: 8px !important;
        flex-wrap: wrap;
      }

      .filter-buttons button {
        flex: 1;
        min-width: 100px;
        padding: 10px !important;
        font-size: 12px !important;
      }

      /* Sort Controls */
      .sort-controls {
        flex-direction: column !important;
        align-items: stretch !important;
        gap: 10px !important;
      }

      .sort-controls > div {
        width: 100%;
        flex-direction: column !important;
      }

      .sort-controls span {
        font-size: 13px;
        margin-bottom: 5px;
      }

      .sort-controls select {
        width: 100%;
        font-size: 13px !important;
        padding: 8px !important;
      }

      #resultsCount {
        text-align: center;
        margin-top: 8px;
        font-size: 12px !important;
      }

      /* Car List */
      #allCarsList {
        flex-direction: column !important;
        gap: 12px !important;
        align-items: stretch !important;
      }

      #carDetailsModal > div {
        max-width: 95%;
        margin: 20px auto;
        max-height: 90vh;
        overflow-y: auto;
      }
    }
  </style>
  <script src="js/config.js"></script>
  <script src="js/auth-api.js"></script>
  <script src="js/carManager-api.js"></script>
  <script src="js/chatbot.js"></script>
  <script src="js/paymentSystem.js"></script>
  <script src="js/messaging.js"></script>
  <script>
    function toggleNavbar() {
      const nav = document.getElementById("navbarLinks");
      if (nav) nav.classList.toggle("show");
    }
  </script>
</head>
<body>
  <!-- Hamburger icon -->
  <div class="hamburger" onclick="toggleNavbar()">☰</div>
  <!-- Navbar -->
  <nav class="top-navbar">
    <div class="logo-location">
      <img src="images/logo.png" alt="logo" style="height: 40px; width: auto;">
    </div>
    <div class="navbar-right" id="navbarLinks">
      <a href="home.html">Home</a>
      <a href="all-cars.html" class="active">Buy Car</a>
      <a href="post-car.html">Sell Car</a>
      <a href="compare.html">Compare</a>
      <a href="dashboard.html" id="profileNavBtn" style="display:none;">Dashboard</a>
      <a href="#" id="loginNavBtn" onclick="showLoginModal()">Login/Register</a>
      <a href="#" id="logoutNavBtn" onclick="logoutUser()" style="display:none;">Logout</a>
    </div>
  </nav>
  <div class="container" style="max-width:900px; margin:40px auto 0;">
    <h2 style="text-align:center;">All Cars</h2>
    <!-- Search Bar -->
    <div style="text-align:center; margin-bottom:30px;">
      <div style="display:inline-flex; background:#fff; border-radius:25px; box-shadow:0 4px 15px rgba(0,0,0,0.1); overflow:hidden; max-width:500px; width:100%;">
        <input type="text" id="searchInput" placeholder="Search by make, model, or location..." style="flex:1; padding:15px 20px; border:none; outline:none; font-size:16px;">
        <button onclick="performSearch()" style="padding:15px 25px; background:#f9b233; border:none; color:#fff; font-weight:bold; cursor:pointer;"><i class="material-icons">search</i></button>
      </div>
    </div>
    
    <!-- Advanced Filters -->
    <div style="background:#fff; border-radius:12px; padding:25px; margin-bottom:25px; box-shadow:0 4px 15px rgba(0,0,0,0.1);">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 style="margin:0; color:#333;">🔧 Filters</h3>
        <button onclick="toggleFilters()" id="filterToggle" style="padding:8px 16px; background:none; border:2px solid #f9b233; color:#f9b233; border-radius:6px; font-weight:bold; cursor:pointer;">Show Filters</button>
      </div>
      
      <div id="filtersContent" style="display:none;">
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:15px; margin-bottom:20px;">
          <div>
            <label style="display:block; margin-bottom:5px; font-weight:600;">Make</label>
            <select id="filterMake">
              <option value="">All Makes</option>
            </select>
          </div>
          <div>
            <label style="display:block; margin-bottom:5px; font-weight:600;">Fuel Type</label>
            <select id="filterFuelType">
              <option value="">All Fuel Types</option>
              <option value="Petrol">Petrol</option>
              <option value="Diesel">Diesel</option>
              <option value="CNG">CNG</option>
              <option value="Electric">Electric</option>
              <option value="Hybrid">Hybrid</option>
            </select>
          </div>
          <div>
            <label style="display:block; margin-bottom:5px; font-weight:600;">Transmission</label>
            <select id="filterTransmission">
              <option value="">All Transmissions</option>
              <option value="Manual">Manual</option>
              <option value="Automatic">Automatic</option>
              <option value="CVT">CVT</option>
            </select>
          </div>
          <div>
            <label style="display:block; margin-bottom:5px; font-weight:600;">Location</label>
            <input type="text" id="filterLocation" placeholder="City" style="width:100%; padding:10px; border:2px solid #eee; border-radius:6px;">
          </div>
        </div>
        
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:15px; margin-bottom:20px;">
          <div>
            <label style="display:block; margin-bottom:5px; font-weight:600;">Min Price (₹)</label>
            <input type="number" id="filterMinPrice" placeholder="50000" style="width:100%; padding:10px; border:2px solid #eee; border-radius:6px;">
          </div>
          <div>
            <label style="display:block; margin-bottom:5px; font-weight:600;">Max Price (₹)</label>
            <input type="number" id="filterMaxPrice" placeholder="7000000" style="width:100%; padding:10px; border:2px solid #eee; border-radius:6px;">
          </div>
          <div>
            <label style="display:block; margin-bottom:5px; font-weight:600;">Min Year</label>
            <input type="number" id="filterMinYear" placeholder="2010" style="width:100%; padding:10px; border:2px solid #eee; border-radius:6px;">
          </div>
          <div>
            <label style="display:block; margin-bottom:5px; font-weight:600;">Max Year</label>
            <input type="number" id="filterMaxYear" placeholder="2025" style="width:100%; padding:10px; border:2px solid #eee; border-radius:6px;">
          </div>
        </div>
        
        <div style="display:flex; gap:10px; justify-content:center;">
          <button onclick="applyFilters()" style="padding:12px 30px; background:#f9b233; border:none; color:#fff; font-weight:bold; border-radius:8px; cursor:pointer;">Apply Filters</button>
          <button onclick="clearAllFilters()" style="padding:12px 30px; background:#6c757d; border:none; color:#fff; font-weight:bold; border-radius:8px; cursor:pointer;">Clear All</button>
        </div>
      </div>
    </div>
    
    <!-- Sorting Options -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
      <div style="display:flex; align-items:center; gap:15px;">
        <span style="font-weight:600;">Sort by:</span>
        <select id="sortBy" onchange="applyFilters()" style="padding:8px 12px; border:2px solid #eee; border-radius:6px; background:#fff;">
          <option value="newest">Newest First</option>
          <option value="price_low">Price: Low to High</option>
          <option value="price_high">Price: High to Low</option>
          <option value="year_new">Year: Newest First</option>
          <option value="mileage_low">Mileage: Low to High</option>
          <option value="popular">Most Popular</option>
        </select>
      </div>
      <div id="resultsCount" style="color:#666; font-weight:600;"></div>
    </div>
    <div id="allCarsList" style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center;"></div>
    <!-- Car Details Modal -->
    <div id="carDetailsModal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); z-index:1000;">
      <div id="carDetailsContent" style="background:#fff; max-width:400px; margin:60px auto; padding:30px; border-radius:8px; position:relative;"></div>
    </div>
  </div>
  <style>
    @keyframes slowZoom {
      0% {
        transform: scale(1);
      }
      100% {
        transform: scale(1.2);
      }
    }
    
    .car-image-hover {
      animation: slowZoom 3s ease-in-out infinite alternate;
    }
  </style>
  <script>
    let currentSearchQuery = '';
    let filtersVisible = false;

    // Car brands database for filter dropdown
    const carBrands = {
      'Maruti Suzuki': ['Swift', 'Baleno', 'Vitara Brezza', 'Ertiga', 'Dzire', 'Alto', 'WagonR', 'Celerio', 'S-Cross', 'Ciaz', 'Ignis'],
      'Hyundai': ['Creta', 'Verna', 'i20', 'Venue', 'Elantra', 'Grand i10', 'Aura', 'Tucson', 'Kona', 'Alcazar'],
      'Tata': ['Nexon', 'Harrier', 'Safari', 'Altroz', 'Tiago', 'Tigor', 'Punch', 'Hexa', 'Indica'],
      'Mahindra': ['XUV700', 'XUV300', 'Scorpio', 'Thar', 'Bolero', 'XUV500', 'KUV100', 'Marazzo'],
      'Honda': ['City', 'Amaze', 'Jazz', 'WR-V', 'Civic', 'CR-V', 'Accord', 'Brio'],
      'Toyota': ['Fortuner', 'Innova Crysta', 'Glanza', 'Urban Cruiser', 'Camry', 'Yaris', 'Etios', 'Corolla'],
      'Ford': ['EcoSport', 'Endeavour', 'Figo', 'Aspire', 'Freestyle'],
      'Volkswagen': ['Polo', 'Vento', 'Tiguan', 'T-Roc', 'Passat'],
      'Renault': ['Duster', 'Kwid', 'Triber', 'Kiger', 'Captur'],
      'Nissan': ['Magnite', 'Kicks', 'GT-R', 'Terrano'],
      'Skoda': ['Octavia', 'Rapid', 'Superb', 'Kodiaq', 'Kushaq'],
      'Kia': ['Seltos', 'Sonet', 'Carnival', 'Carens'],
      'MG': ['Hector', 'Astor', 'ZS EV', 'Gloster'],
      'Jeep': ['Compass', 'Wrangler', 'Grand Cherokee'],
      'Audi': ['A4', 'A6', 'Q3', 'Q5', 'Q7', 'A3', 'Q8', 'RS5'],
      'BMW': ['3 Series', '5 Series', 'X1', 'X3', 'X5', 'X7', '7 Series', 'Z4'],
      'Mercedes-Benz': ['C-Class', 'E-Class', 'S-Class', 'GLA', 'GLC', 'GLE', 'GLS', 'A-Class'],
      'Chevrolet': ['Beat', 'Spark', 'Cruze', 'Trailblazer'],
      'Fiat': ['Punto', 'Linea', 'Avventura'],
      'Datsun': ['GO', 'GO+', 'redi-GO']
    };

    document.addEventListener('DOMContentLoaded', async function() {
      initializePage();
      await renderAllCars();
    });

    function initializePage() {
      populateMakeFilter();
      setupEventListeners();
    }

    function populateMakeFilter() {
      const makeSelect = document.getElementById('filterMake');
      Object.keys(carBrands).forEach(brand => {
        const option = document.createElement('option');
        option.value = brand;
        option.textContent = brand;
        makeSelect.appendChild(option);
      });
    }

    function setupEventListeners() {
      // Search on Enter key
      document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          performSearch();
        }
      });
    }

    function toggleFilters() {
      const content = document.getElementById('filtersContent');
      const toggle = document.getElementById('filterToggle');
      
      filtersVisible = !filtersVisible;
      content.style.display = filtersVisible ? 'block' : 'none';
      toggle.textContent = filtersVisible ? 'Hide Filters' : 'Show Filters';
    }

    function performSearch() {
      currentSearchQuery = document.getElementById('searchInput').value.trim();
      applyFilters();
    }

    function getFilters() {
      const minPrice = document.getElementById('filterMinPrice').value.trim();
      const maxPrice = document.getElementById('filterMaxPrice').value.trim();
      const minYear = document.getElementById('filterMinYear').value.trim();
      const maxYear = document.getElementById('filterMaxYear').value.trim();
      const make = document.getElementById('filterMake').value;
      const fuelType = document.getElementById('filterFuelType').value;
      const transmission = document.getElementById('filterTransmission').value;
      const location = document.getElementById('filterLocation').value.trim();
      
      const filters = {
        limit: 100
      };
      
      // Only add filters if they have values
      if (make) filters.make = make;
      if (fuelType) filters.fuelType = fuelType;
      if (transmission) filters.transmission = transmission;
      if (location) filters.location = location;
      if (minPrice) filters.priceFrom = minPrice;
      if (maxPrice) filters.priceTo = maxPrice;
      if (minYear) filters.yearFrom = minYear;
      if (maxYear) filters.yearTo = maxYear;
      
      return filters;
    }

    async function applyFilters() {
      const filters = getFilters();
      const sortBy = document.getElementById('sortBy').value;
      
      // Add sorting parameters based on selected sort option
      switch(sortBy) {
        case 'newest':
          filters.sortBy = 'created_at';
          filters.sortOrder = 'DESC';
          break;
        case 'price_low':
          filters.sortBy = 'price';
          filters.sortOrder = 'ASC';
          break;
        case 'price_high':
          filters.sortBy = 'price';
          filters.sortOrder = 'DESC';
          break;
        case 'year_new':
          filters.sortBy = 'year';
          filters.sortOrder = 'DESC';
          break;
        case 'mileage_low':
          filters.sortBy = 'mileage';
          filters.sortOrder = 'ASC';
          break;
        case 'popular':
          filters.sortBy = 'views_count';
          filters.sortOrder = 'DESC';
          break;
      }
      
      // Add search query if exists
      if (currentSearchQuery) {
        filters.search = currentSearchQuery;
      }
      
      const cars = await carManager.getAllCars(filters);
      renderCars(cars);
      updateResultsCount(cars.length);
    }

    async function clearAllFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('filterMake').value = '';
      document.getElementById('filterFuelType').value = '';
      document.getElementById('filterTransmission').value = '';
      document.getElementById('filterLocation').value = '';
      document.getElementById('filterMinPrice').value = '';
      document.getElementById('filterMaxPrice').value = '';
      document.getElementById('filterMinYear').value = '';
      document.getElementById('filterMaxYear').value = '';
      
      currentSearchQuery = '';
      await renderAllCars();
    }

    async function renderAllCars() {
      const cars = await carManager.getAllCars({ limit: 100 });
      renderCars(cars);
      updateResultsCount(cars.length);
    }

    function renderCars(cars) {
      const list = document.getElementById('allCarsList');
      if (!list) return;
      
      list.innerHTML = '';
      
      if (cars.length === 0) {
        list.innerHTML = `
          <div style="text-align:center; padding:60px; color:#888; width:100%;">
            <div style="font-size:48px; margin-bottom:20px;"><i class="material-icons">directions_car</i></div>
            <h3>No cars found</h3>
            <p>Try adjusting your search criteria or filters</p>
          </div>
        `;
        return;
      }
      
      cars.forEach((car, idx) => {
        const card = document.createElement('div');
        
        // Responsive width based on screen size
        let cardWidth = '320px';
        if (window.innerWidth <= 600) {
          cardWidth = '100%';
        } else if (window.innerWidth <= 1000) {
          cardWidth = 'calc(50% - 8px)';
        } else if (window.innerWidth <= 1400) {
          cardWidth = 'calc(33.333% - 10px)';
        }
        
        card.style = `border:1px solid #eee; border-radius:16px; padding:0; width:${cardWidth}; background:#fff; box-shadow:0 4px 20px rgba(0,0,0,0.08); cursor:pointer; transition:all 0.3s ease; overflow:hidden;`;
        
        // Add hover effects with continuous zoom animation
        card.onmouseenter = () => {
          card.style.transform = 'scale(1.05)';
          card.style.boxShadow = '0 8px 30px rgba(0,0,0,0.15)';
          const img = card.querySelector('img');
          if (img) {
            img.classList.add('car-image-hover');
          }
        };
        card.onmouseleave = () => {
          card.style.transform = 'scale(1)';
          card.style.boxShadow = '0 4px 20px rgba(0,0,0,0.08)';
          const img = card.querySelector('img');
          if (img) {
            img.classList.remove('car-image-hover');
            img.style.transform = 'scale(1)';
          }
        };
        
        const imgSrc = (car.images && car.images.length > 0) ? car.images[0] : 'images/logo.png';
        const formattedCar = formatCarForDisplay(car);
        
        // Responsive image height
        let imgHeight = '200px';
        if (window.innerWidth <= 600) {
          imgHeight = '280px'; // Larger on mobile
        }
        
        // Array of fallback colors for cars without images
        const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8'];
        const bgColor = colors[idx % colors.length];
        
        card.innerHTML = `
          <div style="position:relative; overflow:hidden; background:${bgColor}; min-height:${imgHeight};">
            <img src="${imgSrc}" alt="Car Image" style="width:100%;height:${imgHeight};object-fit:cover;display:block;" onerror="this.style.display='none';">
            <div style="position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:80px; background:${bgColor}; display:${imgSrc && imgSrc !== 'images/logo.png' ? 'none' : 'flex'};">
              🚗
            </div>
            <button onclick="event.stopPropagation(); toggleFavoriteFromCard('${car.id}')" 
                    style="position:absolute; top:12px; right:12px; width:40px; height:40px; border-radius:50%; border:none; background:rgba(255,255,255,0.95); cursor:pointer; font-size:20px; box-shadow:0 2px 8px rgba(0,0,0,0.2); z-index:10;">
              ${carManager.isCarInFavorites(car.id) ? '<i class="material-icons">favorite</i>' : '<i class="material-icons">favorite_border</i>'}
            </button>
            <div style="position:absolute; bottom:12px; left:12px; padding:6px 12px; background:rgba(0,0,0,0.7); color:#fff; border-radius:20px; font-size:12px; font-weight:bold; z-index:10;">
              ${car.status.toUpperCase()}
            </div>
          </div>
          <div style="padding:20px;">
            <div style="font-size:1.4em; font-weight:bold; margin-bottom:10px; color:#222;">${car.make} ${car.model}</div>
            <div style="font-size:1.6em; font-weight:bold; color:#e74c3c; margin-bottom:12px;">${formattedCar.formattedPrice}</div>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; font-size:14px; color:#666;">
              <div><strong>Year:</strong> ${car.year}</div>
              <div><strong>Mileage:</strong> ${car.mileage ? car.mileage.toLocaleString() + ' km' : 'N/A'}</div>
              <div><strong>Fuel:</strong> ${car.fuelType || 'N/A'}</div>
              <div><strong>Transmission:</strong> ${car.transmission || 'N/A'}</div>
            </div>
            
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px; padding-top:15px; border-top:1px solid #eee;">
              <span style="font-size:13px; color:#888; display:flex; align-items:center;"><i class="material-icons" style="font-size:18px; margin-right:6px;">location_on</i>${car.location || 'Location N/A'}</span>
            </div>
          </div>
        `;
        
        card.onclick = () => window.location.href = `car-details.html?id=${car.id}`;
        list.appendChild(card);
      });
    }

    function updateResultsCount(count) {
      document.getElementById('resultsCount').textContent = `${count} car${count !== 1 ? 's' : ''} found`;
    }

    function toggleFavoriteFromCard(carId) {
      if (!authManager.isLoggedIn()) {
        showMessage('Please login to add favorites', 'error');
        return;
      }

      try {
        const isFavorite = carManager.toggleFavorite(carId);
        showMessage(isFavorite ? 'Added to favorites ❤️' : 'Removed from favorites 🤍', 'success');
        
        // Update the heart icon for all matching buttons
        const heartBtns = document.querySelectorAll(`button[onclick*="toggleFavoriteFromCard('${carId}')"]`);
        heartBtns.forEach(btn => {
          btn.innerHTML = isFavorite ? '<i class="material-icons">favorite</i>' : '<i class="material-icons">favorite_border</i>';
        });
      } catch (error) {
        console.error('Favorite toggle error:', error);
        showMessage('Failed to update favorites', 'error');
      }
    }

    function showMessage(message, type) {
      const messageDiv = document.createElement('div');
      messageDiv.style = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 20px;
        background: ${type === 'success' ? '#28a745' : '#dc3545'};
        color: white;
        border-radius: 8px;
        font-weight: bold;
        z-index: 1001;
        animation: slideIn 0.3s ease-out;
      `;
      messageDiv.textContent = message;
      document.body.appendChild(messageDiv);

      setTimeout(() => {
        messageDiv.remove();
      }, 3000);
    }

    // Legacy functions for compatibility
    function getPostedCars() {
      return carManager.getCars();
    }

    function showCarDetails(car) {
      window.location.href = `car-details.html?id=${car.id}`;
    }

    function hideCarDetails() {
      document.getElementById('carDetailsModal').style.display = 'none';
    }

    // Helper functions
    function formatCurrency(amount) {
      if (!amount) return '₹0';
      return '₹' + parseFloat(amount).toLocaleString('en-IN');
    }

    function formatCarForDisplay(car) {
      return {
        formattedPrice: formatCurrency(car.price)
      };
    }

    // Login Modal Functions
    function showLoginModal() {
      document.getElementById('loginModal').style.display = 'block';
    }
    
    function hideLoginModal() {
      document.getElementById('loginModal').style.display = 'none';
    }

    function switchTab(tab) {
      const loginTab = document.getElementById('loginTab');
      const registerTab = document.getElementById('registerTab');
      const loginContent = document.getElementById('loginFormContent');
      const registerContent = document.getElementById('registerFormContent');
      const messageDiv = document.getElementById('authMessage');

      // Hide message
      messageDiv.style.display = 'none';

      if (tab === 'login') {
        loginTab.style.borderBottomColor = '#f9b233';
        loginTab.style.color = '#f9b233';
        registerTab.style.borderBottomColor = 'transparent';
        registerTab.style.color = '#999';
        loginContent.style.display = 'block';
        registerContent.style.display = 'none';
      } else {
        registerTab.style.borderBottomColor = '#f9b233';
        registerTab.style.color = '#f9b233';
        loginTab.style.borderBottomColor = 'transparent';
        loginTab.style.color = '#999';
        registerContent.style.display = 'block';
        loginContent.style.display = 'none';
      }
    }

    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = '🙈';
      } else {
        input.type = 'password';
        icon.textContent = '👁️';
      }
    }

    function handleLoginSubmit(event) {
      event.preventDefault();
      handleLogin();
      return false;
    }

    function showAuthMessage(message, type) {
      const msgDiv = document.getElementById('authMessage');
      msgDiv.textContent = message;
      msgDiv.style.display = 'block';
      msgDiv.style.backgroundColor = type === 'success' ? '#d4edda' : '#f8d7da';
      msgDiv.style.color = type === 'success' ? '#155724' : '#721c24';
    }

    // Car Eye Animation on Mouse Move
    document.addEventListener('mousemove', (e) => {
      const modal = document.getElementById('loginModal');
      if (modal && modal.style.display === 'block') {
        const leftPupil = document.getElementById('modalLeftPupil');
        const rightPupil = document.getElementById('modalRightPupil');
        
        if (leftPupil && rightPupil) {
          const leftEyeRect = leftPupil.getBoundingClientRect();
          const rightEyeRect = rightPupil.getBoundingClientRect();
          
          const leftEyeX = leftEyeRect.left + leftEyeRect.width / 2;
          const leftEyeY = leftEyeRect.top + leftEyeRect.height / 2;
          const leftAngle = Math.atan2(e.clientY - leftEyeY, e.clientX - leftEyeX);
          const leftDistance = Math.min(8, Math.hypot(e.clientX - leftEyeX, e.clientY - leftEyeY) / 20);
          const leftPupilX = 100 + Math.cos(leftAngle) * leftDistance;
          const leftPupilY = 185 + Math.sin(leftAngle) * leftDistance;
          leftPupil.setAttribute('cx', leftPupilX);
          leftPupil.setAttribute('cy', leftPupilY);
          
          const rightEyeX = rightEyeRect.left + rightEyeRect.width / 2;
          const rightEyeY = rightEyeRect.top + rightEyeRect.height / 2;
          const rightAngle = Math.atan2(e.clientY - rightEyeY, e.clientX - rightEyeX);
          const rightDistance = Math.min(8, Math.hypot(e.clientX - rightEyeX, e.clientY - rightEyeY) / 20);
          const rightPupilX = 220 + Math.cos(rightAngle) * rightDistance;
          const rightPupilY = 185 + Math.sin(rightAngle) * rightDistance;
          rightPupil.setAttribute('cx', rightPupilX);
          rightPupil.setAttribute('cy', rightPupilY);
        }
      }
    });

    // Login and Register Handler Functions
    async function handleLogin() {
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;
      const messageDiv = document.getElementById('authMessage');

      try {
        messageDiv.style.display = 'block';
        messageDiv.textContent = 'Logging in...';
        messageDiv.className = 'auth-message';

        const result = await window.authManager.loginUser(username, password);
        
        if (result.success) {
          messageDiv.textContent = 'Login successful! Redirecting...';
          messageDiv.className = 'auth-message success';
          
          // Determine redirect URL
          const redirectUrl = result.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
          
          // Close modal first
          hideLoginModal();
          
          // Update navigation
          updateNavForLoggedInUser(result.user);
          
          // Redirect
          setTimeout(() => {
            window.location.href = redirectUrl;
          }, 1000);
          
        } else {
          throw new Error(result.message || 'Login failed');
        }
      } catch (error) {
        messageDiv.textContent = error.message || 'Login failed';
        messageDiv.className = 'auth-message error';
      }
    }

    async function handleRegister() {
      const username = document.getElementById('registerUsername').value;
      const email = document.getElementById('registerEmail').value;
      const phone = document.getElementById('registerPhone').value;
      const location = document.getElementById('registerLocation').value;
      const password = document.getElementById('registerPassword').value;
      const confirmPassword = document.getElementById('registerConfirmPassword').value;
      const messageDiv = document.getElementById('authMessage');

      try {
        if (password !== confirmPassword) {
          throw new Error('Passwords do not match');
        }

        messageDiv.style.display = 'block';
        messageDiv.textContent = 'Creating account...';
        messageDiv.className = 'auth-message';

        const userData = {
          username,
          email,
          phone,
          location,
          password,
          full_name: username
        };

        const result = await window.authManager.registerUser(userData);
        
        if (result.success) {
          messageDiv.textContent = 'Registration successful! Redirecting...';
          messageDiv.className = 'auth-message success';
          
          // Update UI
          updateNavForLoggedInUser(result.user);
          
          // Close modal and redirect
          setTimeout(() => {
            hideLoginModal();
            window.location.href = 'dashboard.html';
          }, 1000);
        } else {
          throw new Error(result.message || 'Registration failed');
        }
      } catch (error) {
        messageDiv.textContent = error.message || 'Registration failed';
        messageDiv.className = 'auth-message error';
      }
    }

    function updateNavForLoggedInUser(user) {
      const loginBtn = document.getElementById('loginNavBtn');
      const logoutBtn = document.getElementById('logoutNavBtn');
      const profileBtn = document.getElementById('profileNavBtn');
      const messagesBtn = document.getElementById('messagesNavBtn');

      if (loginBtn) loginBtn.style.display = 'none';
      if (logoutBtn) logoutBtn.style.display = 'block';
      if (profileBtn) profileBtn.style.display = 'block';
      if (messagesBtn) messagesBtn.style.display = 'block';
    }

    function updateNavForLoggedOutUser() {
      const loginBtn = document.getElementById('loginNavBtn');
      const logoutBtn = document.getElementById('logoutNavBtn');
      const profileBtn = document.getElementById('profileNavBtn');
      const messagesBtn = document.getElementById('messagesNavBtn');

      if (loginBtn) loginBtn.style.display = 'block';
      if (logoutBtn) logoutBtn.style.display = 'none';
      if (profileBtn) profileBtn.style.display = 'none';
      if (messagesBtn) messagesBtn.style.display = 'none';
    }

    // Check login status on page load
    document.addEventListener('DOMContentLoaded', function() {
      const token = localStorage.getItem('authToken');
      const userData = localStorage.getItem('userData');
      
      if (token && userData) {
        try {
          const user = JSON.parse(userData);
          updateNavForLoggedInUser(user);
        } catch (error) {
          console.error('Error parsing user data:', error);
          updateNavForLoggedOutUser();
        }
      } else {
        updateNavForLoggedOutUser();
      }
    });
  </script>

  <!-- Enhanced Login/Register Modal -->

    <div style="flex:1; padding:40px; overflow-y:auto;">

        <form id="loginForm" onsubmit="return handleLoginSubmit(event);">
          <div style="margin-bottom:20px;">
            <label style="display:block; margin-bottom:8px; font-weight:600; color:black;">Username</label>
            <input type="text" id="loginUsername" name="loginUsername" required style="width:100%; padding:12px; border:2px solid #ddd; border-radius:8px; font-size:16px; color:black !important; background-color:white !important;">

              <span onclick="togglePassword('loginPassword', this)" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:20px; user-select:none;">👁️</span>

          <button type="submit" style="width:100%; padding:14px; background:#f9b233; border:none; color:#fff; font-weight:bold; font-size:16px; border-radius:8px; cursor:pointer; transition:all 0.3s; box-shadow:0 4px 6px rgba(0,0,0,0.1);" onmouseover="this.style.background='#e6a429'; this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 12px rgba(0,0,0,0.2)';" onmouseout="this.style.background='#f9b233'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 6px rgba(0,0,0,0.1)';">Login</button>
