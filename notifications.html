<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - RideBazzar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .notifications-header {
            background: white;
            border-bottom: 1px solid #dee2e6;
            padding: 20px 0;
            margin-bottom: 20px;
        }

        .notification-item {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .notification-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-color: #007bff;
        }

        .notification-item.unread {
            border-left: 4px solid #007bff;
            background: #f8f9fa;
        }

        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .notification-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.2rem;
        }

        .notification-icon.message {
            background: #e3f2fd;
            color: #1976d2;
        }

        .notification-icon.inquiry {
            background: #e8f5e8;
            color: #388e3c;
        }

        .notification-icon.booking {
            background: #fff3e0;
            color: #f57c00;
        }

        .notification-icon.payment {
            background: #fce4ec;
            color: #c2185b;
        }

        .notification-icon.system {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .notification-message {
            color: #6c757d;
            margin-bottom: 10px;
        }

        .notification-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            color: #868e96;
        }

        .notification-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .filter-tabs {
            margin-bottom: 20px;
        }

        .filter-tab {
            padding: 10px 20px;
            border: 1px solid #dee2e6;
            background: white;
            color: #6c757d;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-tab:first-child {
            border-radius: 8px 0 0 8px;
        }

        .filter-tab:last-child {
            border-radius: 0 8px 8px 0;
        }

        .filter-tab.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }

        .filter-tab + .filter-tab {
            border-left: none;
        }

        .empty-notifications {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .mark-all-read-btn {
            opacity: 0.8;
        }

        .mark-all-read-btn:hover {
            opacity: 1;
        }

        .bulk-actions {
            display: none;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .bulk-actions.show {
            display: block;
        }

        .notification-checkbox {
            margin-right: 10px;
        }

        @media (max-width: 768px) {
            .filter-tabs {
                overflow-x: auto;
                white-space: nowrap;
            }

            .filter-tab {
                display: inline-block;
                min-width: 100px;
                text-align: center;
            }

            .notification-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="home.html">
                <i class="fas fa-car me-2"></i>RideBazzar
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="all-cars.html">Browse Cars</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="compare.html">Compare</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="post-car.html">Sell Your Car</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="messages.html">Messages</a>
                    </li>
                </ul>
                
                <div class="navbar-nav" id="authSection">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-4">
        <!-- Header -->
        <div class="notifications-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-1">Notifications</h2>
                    <p class="text-muted mb-0">Stay updated with your activity</p>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-primary btn-sm mark-all-read-btn" onclick="markAllAsRead()">
                        <i class="fas fa-check-double me-1"></i>Mark All Read
                    </button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="clearAllNotifications()">
                        <i class="fas fa-trash me-1"></i>Clear All
                    </button>
                </div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterNotifications('all')" data-filter="all">
                All <span class="badge bg-secondary ms-1" id="allCount">0</span>
            </button>
            <button class="filter-tab" onclick="filterNotifications('message')" data-filter="message">
                Messages <span class="badge bg-primary ms-1" id="messageCount">0</span>
            </button>
            <button class="filter-tab" onclick="filterNotifications('inquiry')" data-filter="inquiry">
                Inquiries <span class="badge bg-success ms-1" id="inquiryCount">0</span>
            </button>
            <button class="filter-tab" onclick="filterNotifications('booking')" data-filter="booking">
                Bookings <span class="badge bg-warning ms-1" id="bookingCount">0</span>
            </button>
            <button class="filter-tab" onclick="filterNotifications('payment')" data-filter="payment">
                Payments <span class="badge bg-info ms-1" id="paymentCount">0</span>
            </button>
            <button class="filter-tab" onclick="filterNotifications('system')" data-filter="system">
                System <span class="badge bg-secondary ms-1" id="systemCount">0</span>
            </button>
        </div>

        <!-- Bulk Actions -->
        <div class="bulk-actions" id="bulkActions">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <strong id="selectedCount">0</strong> notifications selected
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-primary" onclick="markSelectedAsRead()">
                        <i class="fas fa-check me-1"></i>Mark as Read
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteSelected()">
                        <i class="fas fa-trash me-1"></i>Delete
                    </button>
                    <button class="btn btn-sm btn-outline-secondary" onclick="clearSelection()">
                        Cancel
                    </button>
                </div>
            </div>
        </div>

        <!-- Notifications List -->
        <div id="notificationsList">
            <!-- Notifications will be loaded here -->
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal fade" id="confirmationModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmationTitle">Confirm Action</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="confirmationMessage">
                    Are you sure you want to proceed?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="confirmationConfirm">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/carManager.js"></script>
    <script src="js/messaging.js"></script>
    <script>
        let currentFilter = 'all';
        let selectedNotifications = new Set();
        let allNotifications = [];

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            authManager.checkAuthAndRedirect();
            authManager.updateNavbar();
            loadNotifications();
        });

        // Load notifications
        function loadNotifications() {
            const currentUser = localStorage.getItem('ridebazzar_user');
            if (!currentUser) return;

            allNotifications = messagingManager.getUserNotifications(currentUser);
            updateNotificationCounts();
            renderNotifications();
        }

        // Update notification counts
        function updateNotificationCounts() {
            const counts = {
                all: allNotifications.length,
                message: allNotifications.filter(n => n.type === 'message').length,
                inquiry: allNotifications.filter(n => n.type === 'inquiry').length,
                booking: allNotifications.filter(n => n.type === 'booking').length,
                payment: allNotifications.filter(n => n.type === 'payment').length,
                system: allNotifications.filter(n => n.type === 'system').length
            };

            Object.keys(counts).forEach(type => {
                const badge = document.getElementById(`${type}Count`);
                if (badge) {
                    badge.textContent = counts[type];
                    badge.style.display = counts[type] > 0 ? 'inline' : 'none';
                }
            });
        }

        // Render notifications
        function renderNotifications() {
            const filteredNotifications = currentFilter === 'all' 
                ? allNotifications 
                : allNotifications.filter(n => n.type === currentFilter);

            const notificationsList = document.getElementById('notificationsList');

            if (filteredNotifications.length === 0) {
                notificationsList.innerHTML = `
                    <div class="empty-notifications">
                        <i class="fas fa-bell-slash fa-3x mb-3"></i>
                        <h5>No notifications</h5>
                        <p>You're all caught up!</p>
                    </div>
                `;
                return;
            }

            notificationsList.innerHTML = filteredNotifications.map(notification => {
                const isSelected = selectedNotifications.has(notification.id);
                
                return `
                    <div class="notification-item ${!notification.read ? 'unread' : ''}" 
                         data-notification-id="${notification.id}"
                         onclick="handleNotificationClick('${notification.id}')">
                        <div class="notification-header">
                            <div class="d-flex align-items-center">
                                <input type="checkbox" class="notification-checkbox" 
                                       ${isSelected ? 'checked' : ''}
                                       onclick="toggleNotificationSelection('${notification.id}', event)">
                                <div class="notification-icon ${notification.type}">
                                    <i class="fas ${getNotificationIcon(notification.type)}"></i>
                                </div>
                                <div class="notification-content">
                                    <div class="notification-title">${notification.title}</div>
                                    <div class="notification-message">${notification.message}</div>
                                </div>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                ${!notification.read ? '<div class="badge bg-primary">New</div>' : ''}
                                <small class="text-muted">${formatMessageTime(notification.timestamp)}</small>
                            </div>
                        </div>

                        ${notification.data && getNotificationActions(notification)}
                    </div>
                `;
            }).join('');
        }

        // Get notification icon
        function getNotificationIcon(type) {
            const icons = {
                message: 'fa-comment',
                inquiry: 'fa-question-circle',
                booking: 'fa-calendar-check',
                payment: 'fa-credit-card',
                system: 'fa-cog'
            };
            return icons[type] || 'fa-bell';
        }

        // Get notification actions
        function getNotificationActions(notification) {
            let actions = '';

            if (notification.type === 'message' && notification.data.conversationId) {
                actions = `
                    <div class="notification-actions">
                        <button class="btn btn-sm btn-primary" 
                                onclick="openConversation('${notification.data.conversationId}')">
                            <i class="fas fa-reply me-1"></i>Reply
                        </button>
                    </div>
                `;
            } else if (notification.type === 'inquiry' && notification.data.conversationId) {
                actions = `
                    <div class="notification-actions">
                        <button class="btn btn-sm btn-success" 
                                onclick="openConversation('${notification.data.conversationId}')">
                            <i class="fas fa-comment me-1"></i>Respond
                        </button>
                        <button class="btn btn-sm btn-outline-primary" 
                                onclick="viewCar('${notification.data.carId}')">
                            <i class="fas fa-car me-1"></i>View Car
                        </button>
                    </div>
                `;
            } else if (notification.type === 'booking' && notification.data.bookingId) {
                actions = `
                    <div class="notification-actions">
                        <button class="btn btn-sm btn-primary" 
                                onclick="viewBooking('${notification.data.bookingId}')">
                            <i class="fas fa-eye me-1"></i>View Booking
                        </button>
                    </div>
                `;
            }

            return actions;
        }

        // Handle notification click
        function handleNotificationClick(notificationId) {
            const currentUser = localStorage.getItem('ridebazzar_user');
            messagingManager.markNotificationAsRead(currentUser, notificationId);
            
            // Reload to update UI
            loadNotifications();
        }

        // Filter notifications
        function filterNotifications(type) {
            currentFilter = type;
            
            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`[data-filter="${type}"]`).classList.add('active');

            // Clear selection
            clearSelection();
            
            // Render filtered notifications
            renderNotifications();
        }

        // Toggle notification selection
        function toggleNotificationSelection(notificationId, event) {
            event.stopPropagation();
            
            if (selectedNotifications.has(notificationId)) {
                selectedNotifications.delete(notificationId);
            } else {
                selectedNotifications.add(notificationId);
            }

            updateBulkActions();
        }

        // Update bulk actions
        function updateBulkActions() {
            const bulkActions = document.getElementById('bulkActions');
            const selectedCount = document.getElementById('selectedCount');

            if (selectedNotifications.size > 0) {
                bulkActions.classList.add('show');
                selectedCount.textContent = selectedNotifications.size;
            } else {
                bulkActions.classList.remove('show');
            }
        }

        // Clear selection
        function clearSelection() {
            selectedNotifications.clear();
            updateBulkActions();
            renderNotifications();
        }

        // Mark selected as read
        function markSelectedAsRead() {
            const currentUser = localStorage.getItem('ridebazzar_user');
            
            selectedNotifications.forEach(notificationId => {
                messagingManager.markNotificationAsRead(currentUser, notificationId);
            });

            clearSelection();
            loadNotifications();
            showAlert('Selected notifications marked as read', 'success');
        }

        // Delete selected notifications
        function deleteSelected() {
            showConfirmation(
                'Delete Notifications',
                `Are you sure you want to delete ${selectedNotifications.size} notification(s)? This action cannot be undone.`,
                () => {
                    const currentUser = localStorage.getItem('ridebazzar_user');
                    let notifications = messagingManager.getUserNotifications(currentUser);
                    
                    notifications = notifications.filter(n => !selectedNotifications.has(n.id));
                    localStorage.setItem(`ridebazzar_notifications_${currentUser}`, JSON.stringify(notifications));

                    clearSelection();
                    loadNotifications();
                    showAlert('Selected notifications deleted', 'success');
                }
            );
        }

        // Mark all as read
        function markAllAsRead() {
            const currentUser = localStorage.getItem('ridebazzar_user');
            const notifications = messagingManager.getUserNotifications(currentUser);
            
            notifications.forEach(notification => {
                notification.read = true;
            });

            localStorage.setItem(`ridebazzar_notifications_${currentUser}`, JSON.stringify(notifications));
            loadNotifications();
            showAlert('All notifications marked as read', 'success');
        }

        // Clear all notifications
        function clearAllNotifications() {
            showConfirmation(
                'Clear All Notifications',
                'Are you sure you want to clear all notifications? This action cannot be undone.',
                () => {
                    const currentUser = localStorage.getItem('ridebazzar_user');
                    localStorage.setItem(`ridebazzar_notifications_${currentUser}`, JSON.stringify([]));
                    loadNotifications();
                    showAlert('All notifications cleared', 'success');
                }
            );
        }

        // Open conversation
        function openConversation(conversationId) {
            window.location.href = `messages.html?conversation=${conversationId}`;
        }

        // View car
        function viewCar(carId) {
            window.location.href = `car-details.html?id=${carId}`;
        }

        // View booking
        function viewBooking(bookingId) {
            window.location.href = `dashboard.html?tab=bookings&booking=${bookingId}`;
        }

        // Show confirmation modal
        function showConfirmation(title, message, onConfirm) {
            document.getElementById('confirmationTitle').textContent = title;
            document.getElementById('confirmationMessage').textContent = message;
            
            const confirmBtn = document.getElementById('confirmationConfirm');
            confirmBtn.onclick = () => {
                const modal = bootstrap.Modal.getInstance(document.getElementById('confirmationModal'));
                modal.hide();
                onConfirm();
            };
            
            new bootstrap.Modal(document.getElementById('confirmationModal')).show();
        }

        // Show alert
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show position-fixed`;
            alertDiv.style.cssText = 'top: 80px; right: 20px; z-index: 1050; max-width: 400px;';
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            document.body.appendChild(alertDiv);
            
            setTimeout(() => {
                if (alertDiv.parentElement) {
                    alertDiv.remove();
                }
            }, 5000);
        }
    </script>
</body>
</html>
